spring:
  application:
    name: sentinel
  data:
    mongodb:
      uri: mongodb://localhost:27017/sentinel
      database: sentinel
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: sentinel-consumer-group
  redis:
    host: localhost
    port: 6379

sentinel:
  kafka:
    topic: transactions
  embedding:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com
    model: text-embedding-3-small

server:
  port: 8080

logging:
  level:
    com.sentinel: INFO
    org.springframework.data.mongodb: WARN
    org.apache.kafka: WARN
